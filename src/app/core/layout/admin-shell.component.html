<div class="d-flex" style="min-height: 100vh;">

  <!-- ===== SIDEBAR ===== -->
  <nav class="d-flex flex-column bg-dark text-white"
       style="width: 240px; min-height: 100vh; flex-shrink: 0;">

    <!-- Brand -->
    <div class="px-3 py-3 border-bottom border-secondary">
      <div class="fw-bold text-white fs-6 d-flex align-items-center gap-2">
        <i class="bi bi-shield-check text-primary"></i>
        Admin Panel
      </div>
      <div class="text-secondary" style="font-size: 11px;">Membership System</div>
    </div>

    <!-- Nav Links -->
    <ul class="nav flex-column p-2 flex-grow-1 gap-1">
      <li class="nav-item">
        <a routerLink="/members" routerLinkActive="bg-primary text-white"
           class="nav-link text-white-50 px-3 py-2 rounded d-flex align-items-center gap-2">
          <i class="bi bi-people-fill"></i>
          <span>Members</span>
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/redemptions" routerLinkActive="bg-primary text-white"
           class="nav-link text-white-50 px-3 py-2 rounded d-flex align-items-center gap-2">
          <i class="bi bi-gift-fill"></i>
          <span>Redemptions</span>
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/tiers" routerLinkActive="bg-primary text-white"
           class="nav-link text-white-50 px-3 py-2 rounded d-flex align-items-center gap-2">
          <i class="bi bi-layers-fill"></i>
          <span>Tiers</span>
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/transactions" routerLinkActive="bg-primary text-white"
           class="nav-link text-white-50 px-3 py-2 rounded d-flex align-items-center gap-2">
          <i class="bi bi-journal-text"></i>
          <span>Transactions</span>
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/users" routerLinkActive="bg-primary text-white"
           class="nav-link text-white-50 px-3 py-2 rounded d-flex align-items-center gap-2">
          <i class="bi bi-person-lock"></i>
          <span>Admin</span>
        </a>
      </li>
    </ul>

    <!-- Footer -->
    <div class="px-3 py-2 border-top border-secondary">
      <small class="text-secondary">v1.0.0 &bull; Admin Panel</small>
    </div>
  </nav>

  <!-- ===== MAIN AREA ===== -->
  <div class="flex-grow-1 d-flex flex-column overflow-hidden">

    <!-- Top Navbar -->
    <header class="bg-white border-bottom px-4 d-flex align-items-center justify-content-between"
            style="height: 56px; flex-shrink: 0;">
      <span class="fw-semibold text-dark">
        <i class="bi bi-grid-3x3-gap-fill text-primary me-2"></i>Membership Admin
      </span>
      <div class="d-flex align-items-center gap-3">
        <span class="text-muted small">
          <i class="bi bi-person-circle me-1"></i>{{ currentUser?.name || 'Admin' }}
        </span>
        <button class="btn btn-sm btn-outline-danger" (click)="logout()">
          <i class="bi bi-box-arrow-right me-1"></i>Logout
        </button>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-grow-1 overflow-auto p-4 bg-light">
      <router-outlet />
    </main>

  </div>
</div>
