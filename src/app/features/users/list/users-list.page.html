<!-- Header -->
<div class="d-flex align-items-center justify-content-between mb-4">
  <div>
    <h5 class="fw-bold mb-0">
      <i class="bi bi-person-badge-fill text-primary me-2"></i>Admin & Staff
    </h5>
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-0 small">
        <li class="breadcrumb-item text-muted">Admin</li>
        <li class="breadcrumb-item active">System Users</li>
      </ol>
    </nav>
  </div>
  <span class="badge bg-light text-dark border fs-6">Total: {{ users.length }}</span>
</div>

<!-- Table -->
<div class="card border-0 shadow-sm mb-4">
  <div class="card-header bg-white border-bottom fw-medium">
    <i class="bi bi-people-fill me-2 text-muted"></i>Daftar Admin / Staff
  </div>
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th class="px-3 text-muted fw-medium" style="font-size: 12px;">ID</th>
            <th class="text-muted fw-medium" style="font-size: 12px;">NAME</th>
            <th class="text-muted fw-medium" style="font-size: 12px;">EMAIL</th>
            <th class="text-muted fw-medium" style="font-size: 12px;">STATUS</th>
            <th class="text-muted fw-medium" style="font-size: 12px;">MERCHANT TOKEN</th>
            <th class="text-muted fw-medium" style="font-size: 12px;">REGISTERED</th>
            <th class="text-muted fw-medium" style="font-size: 12px;"></th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let u of users">
            <td class="px-3 text-muted small">#{{ u.id }}</td>
            <td>
              <div class="d-flex align-items-center gap-2">
                <div class="d-flex align-items-center justify-content-center rounded-circle bg-primary text-white fw-bold"
                     style="width: 36px; height: 36px; font-size: 14px;">
                  {{ u.name.charAt(0).toUpperCase() }}
                </div>
                <span class="fw-medium">{{ u.name }}</span>
              </div>
            </td>
            <td class="small text-muted">{{ u.email }}</td>
            <td>
              <span *ngIf="u.status === 1" class="badge bg-success-subtle text-success border border-success-subtle">
                <i class="bi bi-check-circle-fill me-1"></i>Active
              </span>
            </td>
            <td>
              <span class="badge bg-secondary-subtle text-secondary border border-secondary-subtle">
                {{ u.tokenCount }} merchants
              </span>
            </td>
            <td class="small text-muted">{{ u.inputDate }}</td>
            <td>
              <a [routerLink]="['/users', u.id]" class="btn btn-sm btn-outline-primary">
                <i class="bi bi-eye me-1"></i>Detail
              </a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
